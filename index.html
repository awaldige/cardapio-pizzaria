<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria AW - Cardápio Digital</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="assets/img/logo-aw.png" alt="Logo da Pizzaria AW" class="logo">
        </div>
        <nav aria-label="Navegação principal">
            <a href="#menu">Menu</a>
            <a href="#order-summary">Meu Pedido</a>
        </nav>
    </header>

    <main>
        <section id="search">
            <h2>O que vamos pedir hoje?</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Ex: Margherita, Suco, Chocolate...">
            </div>
        </section>

        <section id="menu">
            <h2>Cardápio</h2>
            
            <article>
                <h3>Pizzas</h3>
                <ul class="menu-list" id="pizza-list"></ul>
            </article>

            <article>
                <h3>Bebidas</h3>
                <ul class="menu-list" id="drink-list"></ul>
            </article>

            <article>
                <h3>Doces</h3>
                <ul class="menu-list" id="dessert-list"></ul>
            </article>
        </section>

        <section id="order-summary">
            <h2>Resumo do Pedido</h2>
            <ul id="order-list">
                </ul>
            
            <div class="total-container">
                <p>Total: <strong>R$ <span id="total-price">0.00</span></strong></p>
            </div>
            
            <div class="payment-box">
                <label for="payment">Forma de pagamento:</label>
                <select id="payment">
                    <option value="pix">PIX</option>
                    <option value="debito">Débito</option>
                    <option value="credito">Crédito</option>
                    <option value="dinheiro">Dinheiro</option>
                </select>
            </div>
            
            <button id="finalizar-pedido" class="btn-success">Finalizar via WhatsApp</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Pizzaria AW | Aberto das 18h às 23h</p>
    </footer>

    <script src="js/script.js" defer></script>
</body>
</html>
